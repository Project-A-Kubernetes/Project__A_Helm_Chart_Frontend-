
# This sets the container image 
image:
  repository: 430695042840.dkr.ecr.us-east-1.amazonaws.com/project_a_kubernetes
  pullPolicy: IfNotPresent
  tag: sha-df0372d
  
#pod configmap
configmap:
  enabled: true 
  name: frontend-config
  data: "/api" 

nameOverride: "frontend"
fullnameOverride: "project-a-helm-frontend"

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::430695042840:role/kube-SA-OIDC

# This is for setting Kubernetes Annotations to a Pod.
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
podLabels: {}

#defining pod level security... least privilledge and blast radius control
securityContext: 
   capabilities:
     drop:
     - ALL
   readOnlyRootFilesystem: true
   runAsNonRoot: true
   runAsUser: 400
#this is configmap for my deployment 
env:
  name: API_BASE_URL 
  configName: frontend-config 
  key: API_BASE_URL

# This is for setting up a service
service:
  type: ClusterIP
  port: 80

# This block is for setting up the ingress 
ingress:
  enabled: true
  className: "nginx"
  annotations: 
     cert-manager.io/cluster-issuer: letsencrypt-production 
     nginx.ingress.kubernetes.io/force-ssl-redirect: "true" #forcing ssl request 
     nginx.ingress.kubernetes.io/backend-protocol: "HTTP" #internal routing is HTTP
     nginx.ingress.kubernetes.io/proxy-body-size: "10m"
     nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
     nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
     nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
     nginx.ingress.kubernetes.io/limit-rps: "5" #change to desire
     nginx.ingress.kubernetes.io/limit-burst-multiplier: "2" #using strict rate limiting
  #  because we are using free sub domain like nip.io we will have multiple hostname like this but with a single proper domain we will only have one host 
  hosts:
    - host: 34.228.94.244.nip.io
      paths:
        - path: /api
          pathType: Prefix
          ServiceName: "project-a-helm-backend"
          ServicePort: 8000
        - path: /
          pathType: Prefix
          ServiceName: "project-a-helm-frontend"
          ServicePort: 80
    - host: 18.213.243.163.nip.io
      paths:
        - path: /api
          pathType: Prefix
          ServiceName: "project-a-helm-backend"
          ServicePort: 8000
        - path: /
          pathType: Prefix
          ServiceName: "project-a-helm-frontend"
          ServicePort: 80   
        
  # tls: 
  #   - secretName: felix-cert-secret
  #     hosts:
  #       - 34.228.94.244.nip.io
  #       - 18.213.243.163.nip.io

#Setting up a clusterissuer and certificate 

clusterissuer:
  enabled: true 
  issuerName: letsencrypt-production 
  email: aghedofelix13@gmail.com
  server: https://acme-v02.api.letsencrypt.org/directory
  secretName: letsencrypt-prod-key
  ingressName: nginx 

certificate:
  enabled: true 
  certificateName: project-a-felix-tls 
  secretCertName: felix-cert-secret 
  issuerName: letsencrypt-production
  issuerKind: ClusterIssuer 
  dnsNames:  
    - 34.228.94.244.nip.io
    - 18.213.243.163.nip.io

#This define my pods resource  limits and request
resources: 
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

# This is to setup the startup, liveness and readiness probes
startupProbe:
  httpGet:
    path: /healthz
    port: http
  failureThreshold: 30
  timeoutSeconds: 2
  periodSeconds: 5
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 2
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 10
  timeoutSeconds: 2
  periodSeconds: 5

# This section is for setting up autoscaling 
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70 #We scale pod when the cpu reources get to 70%
  targetMemoryUtilizationPercentage: 70 #we scale pods when the memory usage gets to 70% 
 