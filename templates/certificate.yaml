{{- if .Values.certificate.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificate.certificateName }}
spec:
  secretName: {{ .Values.certificate.secretCertName }}
  issuerRef:
    name: {{ .Values.certificate.issuerName }}
    kind: {{ .Values.certificate.issuerKind }}
  dnsNames:
{{ .Values.certificate.dnsNames | toYaml | indent 4 }}
{{- end }}