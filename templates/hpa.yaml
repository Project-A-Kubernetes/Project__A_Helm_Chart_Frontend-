{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "project_A_helm_frontend.fullname" . }}
  labels:
    {{- include "project_A_helm_frontend.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "project_A_helm_frontend.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.autoscaling.stabilizeWindowSecondsScaleUp}}
      selectPolicy: {{ .Values.autoscaling.selectPolicy}}
      {{- range .Values.autoscaling.policiesUp}}
      policies:
        - type: {{.type}}
          value: {{.value}}
          periodSeconds: {{.periodSeconds}}
      {{- end }}
    scaleDown: 
      stabilizationWindowSeconds: {{ .Values.autoscaling.stabilizeWindowSecondsScaleDown}}
      selectPolicy: {{ .Values.autoscaling.selectPolicy}}
     {{- range .Values.autoscaling.policiesDown}}
      policies:
        - type: {{.type}}
          value: {{.value}}
          periodSeconds: {{.periodSeconds}}
      {{- end }}
{{- end }}
